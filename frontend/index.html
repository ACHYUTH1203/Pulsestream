<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PulseStream | Executive Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-950 text-gray-200 font-sans min-h-screen pb-12">

    <header class="py-8 bg-gray-900 border-b border-gray-800 shadow-lg text-center">
        <h1 class="text-3xl font-bold text-white tracking-wide"> PulseStream Intelligence</h1>
        <p class="text-gray-400 mt-2">Real-Time Crypto Market & Sentiment Radar</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 mt-8 space-y-12">

        <section>
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-2xl font-bold text-white"> Liquidity Matrix (Top 20)</h2>
                <button id="refreshCryptoBtn" onclick="loadCryptoData()" class="text-sm text-blue-400 hover:text-blue-300 transition flex items-center gap-1">
                    ↻ Live Sync
                </button>
            </div>
            
            <div id="cryptoGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 p-2">
                <div class="col-span-full text-center py-8 text-gray-500">Loading market data...</div>
            </div>
        </section>

        <hr class="border-gray-800">

        <section>
            <div class="flex flex-col items-center mb-8">
                <h2 class="text-2xl font-bold text-white mb-2">AI Market Sentiment</h2>
                <p class="text-gray-400 text-center max-w-2xl mb-6">Trigger the Llama 3.1 LLM to scrape the web, analyze the latest headlines, and determine the market.</p>
                <button id="refreshNewsBtn" class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg transition duration-200 shadow-[0_0_15px_rgba(37,99,235,0.4)]">
                     Fetch & Analyze Live News
                </button>
            </div>

            <div id="loadingNews" class="hidden text-center py-8">
                <div class="animate-spin rounded-full h-10 w-10 border-t-2 border-b-2 border-blue-500 mx-auto mb-4"></div>
                <p class="text-blue-400 font-medium animate-pulse">AI Agents are reading the news...</p>
            </div>

            <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </section>

    </main>

    <script>
        // --- 1. LOAD CRYPTO DATA ---
        async function loadCryptoData() {
            const btn = document.getElementById('refreshCryptoBtn');
            const originalText = btn.innerText;
            btn.innerText = '⏳ Syncing...';
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                // Force live scrape, then fetch from DB
                await fetch('/api/update-prices', { method: 'POST' });
                const res = await fetch('/api/prices');
                const data = await res.json();
                
                const grid = document.getElementById('cryptoGrid');
                grid.innerHTML = ''; // Clear loading text

                // Formatter for large numbers (e.g. 1.34T, 85B)
                const formatLargeNumber = (num) => {
                    if (num >= 1e12) return '$' + (num / 1e12).toFixed(2) + 'T';
                    if (num >= 1e9) return '$' + (num / 1e9).toFixed(2) + 'B';
                    if (num >= 1e6) return '$' + (num / 1e6).toFixed(2) + 'M';
                    return '$' + num.toLocaleString();
                };

                data.forEach(coin => {
                    // 1. Calculate Volatility & Colors
                    const isPositive = coin.change_24h >= 0;
                    const colorText = isPositive ? 'text-green-400' : 'text-red-400';
                    const colorBg = isPositive ? 'bg-green-900/30' : 'bg-red-900/30';
                    const sign = isPositive ? '+' : '';

                    // 2. Calculate Liquidity (Turnover Ratio)
                    const liquidityRatio = ((coin.total_volume / coin.market_cap) * 100).toFixed(2);
                    const liqBadge = liquidityRatio > 5.0 ? '💧 High' : liquidityRatio > 2.0 ? '⚖️ Med' : '⚠️ Low';
                    const liqColor = liquidityRatio > 5.0 ? 'text-blue-400' : liquidityRatio > 2.0 ? 'text-yellow-400' : 'text-orange-500';

                    // 3. Formatter Logic
                    const athColor = coin.ath_change_percentage < -50 ? 'text-red-500' : 'text-gray-400';
                    const formattedCap = formatLargeNumber(coin.market_cap);

                    // 4. Build the Ultimate Executive Card
                    grid.innerHTML += `
                        <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 shadow-md hover:border-gray-600 transition flex flex-col gap-3">
                            
                            <div class="flex justify-between items-start">
                                <div>
                                    <span class="text-xs text-gray-500 font-mono">#${coin.rank}</span>
                                    <h3 class="text-lg font-bold text-white uppercase leading-none">${coin.symbol}</h3>
                                </div>
                                <div class="text-right">
                                    <p class="text-md font-bold text-white">$${coin.price_usd.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 4})}</p>
                                    <p class="text-xs font-bold ${colorText} ${colorBg} px-1.5 py-0.5 rounded inline-block mt-1">${sign}${coin.change_24h.toFixed(2)}%</p>
                                </div>
                            </div>

                            <hr class="border-gray-800">

                            <div class="flex justify-between items-end">
                                <div>
                                    <p class="text-[10px] text-gray-500 uppercase tracking-wider mb-0.5">Market Cap</p>
                                    <p class="text-sm text-gray-300 font-mono">${formattedCap}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] text-gray-500 uppercase tracking-wider mb-0.5">Vol / M.Cap</p>
                                    <p class="text-sm font-bold ${liqColor}">${liqBadge} <span class="text-gray-400 font-normal text-xs">(${liquidityRatio}%)</span></p>
                                </div>
                            </div>

                            <div class="bg-gray-950 rounded-lg p-2 mt-1 border border-gray-800 flex justify-between">
                                <div class="flex flex-col">
                                    <span class="text-[10px] text-gray-500">24h Spread</span>
                                    <span class="text-xs text-gray-400 font-mono">${coin.low_24h ? '$'+coin.low_24h.toLocaleString(undefined, {maximumFractionDigits:0}) : 'N/A'} - ${coin.high_24h ? '$'+coin.high_24h.toLocaleString(undefined, {maximumFractionDigits:0}) : 'N/A'}</span>
                                </div>
                                <div class="flex flex-col text-right">
                                    <span class="text-[10px] text-gray-500">ATH Drop</span>
                                    <span class="text-xs font-mono font-medium ${athColor}">${coin.ath_change_percentage ? coin.ath_change_percentage.toFixed(2) + '%' : 'N/A'}</span>
                                </div>
                            </div>

                        </div>
                    `;
                });

            } catch (error) {
                console.error("Error loading crypto data:", error);
                alert("Failed to fetch live data. Ensure backend is running.");
            } finally {
                btn.innerText = originalText;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        // --- 2. LOAD AI NEWS ---
        document.getElementById('refreshNewsBtn').addEventListener('click', async () => {
            const newsGrid = document.getElementById('newsGrid');
            const loading = document.getElementById('loadingNews');
            
            loading.classList.remove('hidden');
            newsGrid.innerHTML = '';
            
            try {
                // Fetch from FastAPI Groq LLM endpoint
                const response = await fetch('/api/live-news');
                const newsData = await response.json();

                loading.classList.add('hidden');

                newsData.forEach(news => {
                    const isBull = news.sentiment === "Bullish";
                    const isBear = news.sentiment === "Bearish";
                    const badgeColor = isBull ? 'bg-green-900/50 text-green-400 border-green-800' : 
                                       isBear ? 'bg-red-900/50 text-red-400 border-red-800' : 
                                       'bg-gray-800 text-gray-300 border-gray-700';
                    const emoji = isBull ? "🚀" : isBear ? "📉" : "⚖️";

                    newsGrid.innerHTML += `
                        <div class="bg-gray-900 border border-gray-800 rounded-xl p-6 shadow-md hover:border-blue-500 transition flex flex-col">
                            <div class="flex justify-between items-start mb-4">
                                <span class="text-xs text-gray-500 font-mono">${news.publisher}</span>
                                <span class="px-3 py-1 text-xs font-bold rounded-full border ${badgeColor}">${emoji} ${news.sentiment}</span>
                            </div>
                            <h3 class="text-lg font-bold text-white mb-2 leading-tight">${news.title}</h3>
                            <p class="text-sm text-gray-400 mb-6 flex-grow"><strong class="text-blue-400">AI Analysis:</strong> ${news.ai_summary}</p>
                            <a href="${news.url}" target="_blank" class="text-sm text-blue-500 hover:text-blue-400 font-semibold mt-auto">Read Source ↗</a>
                        </div>
                    `;
                });
            } catch (error) {
                loading.classList.add('hidden');
                newsGrid.innerHTML = `<div class="col-span-2 text-center text-red-400">Error connecting to AI Engine.</div>`;
            }
        });

        // Initialize dashboard on page load
        window.onload = loadCryptoData;
    </script>
</body>
</html>
